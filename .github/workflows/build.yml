name: Build NixOS Pi SD Image

on:
  push:
    paths:
      - 'pi/**'
      - 'flake.nix'  # if using flake
      - '.github/workflows/build-pi-image.yml'
  pull_request:
    paths:
      - 'pi/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            extra-platforms = aarch64-linux
            substituters = https://cache.nixos.org https://dawidde-nixos.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= dawidde-nixos.cachix.org-1:...

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: dawidde-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Enable aarch64 emulation (for non-cross build)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y qemu-user-static binfmt-support
          echo "extra-platforms = aarch64-linux" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon

      - name: Build SD Image (emulation)
        run: |
          nix-build '<nixpkgs/nixos>' \
            -A config.system.build.sdImage \
            -I nixos-config=./pi/sd-image.nix \
            --argstr system aarch64-linux \
            --option sandbox false \
            -o result-sd-image

      # Alternative with flake (preferred):
      # nix build .#nixosConfigurations.pi4.config.system.build.sdImage -o result-sd-image

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixos-pi4-sd-image
          path: result-sd-image/sd-image-*.img
          retention-days: 30

      - name: Push to Cachix (optional, for the derivation)
        run: |
          nix path-info --json result-sd-image | cachix push dawidde-nixos