name: Build NixOS Pi SD Image

on:
  workflow_dispatch:
  push:
    paths:
      - 'pi/**'
  pull_request:
    paths:
      - 'pi/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: dawidde-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Enable aarch64 emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          echo "extra-platforms = aarch64-linux" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon

      - name: Build SD Image
        run: |
          nix-build '<nixpkgs/nixos>' \
            -A config.system.build.sdImage \
            -I nixos-config=./pi/sd-image.nix \
            --argstr system aarch64-linux \
            --option sandbox false \
            -o result-sd-image

      - name: Upload SD Image
        uses: actions/upload-artifact@v4
        with:
          name: nixos-pi-sd-image
          path: result-sd-image/sd-image-*.img
          retention-days: 30