name: Build RPi4 SD Image

on:
  push:
    branches: [ main, master ]
    paths: [ 'pi/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto
            cores = 0

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: your-cachix-name
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        continue-on-error: true

      - name: Build SD Image (Cross-compilation)
        working-directory: ./pi
        run: nix build .#sd-image -L --print-out-paths --no-link

      - name: Prepare & Compress Artifact
        working-directory: ./pi
        run: |
          mkdir -p ../artifact
          cp -v result/sd-image/*.img* ../artifact/ 2>/dev/null || true
          ls -lh ../artifact/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-nixos-sd-image
          path: artifact/
          retention-days: 30