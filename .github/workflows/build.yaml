name: Build NixOS RPi4 SD Image

on:
  push:
    branches: [ main, master ]
    paths: [ 'pi/**' ]
  pull_request:
    paths: [ 'pi/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix + aarch64 emulation
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-25.05
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto
            system = x86_64-linux
            extra-platforms = aarch64-linux
            substituters = https://cache.nixos.org https://your-cachix-name.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= your-cachix-name.cachix.org-1:...

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: dawidde-nixos
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build SD Image
        working-directory: ./pi
        run: |
          nix build .#packages.x86_64-linux.sd-image \
            --print-out-paths \
            -L \
            --no-link

      - name: Copy and Compress Image
        working-directory: ./pi
        run: |
          mkdir -p ../artifact
          if ls result/sd-image/*.img.zst >/dev/null 2>&1; then
            cp result/sd-image/*.img.zst ../artifact/
          else
            cp result/sd-image/*.img ../artifact/
            zstd -T0 -19 -v --rm ../artifact/*.img
          fi
          ls -lh ../artifact/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-nixos-sd-image
          path: artifact/
          retention-days: 30