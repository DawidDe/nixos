name: Build NixOS SD Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-sd-image:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Better Nix installer
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Your personal Cachix cache
      - name: Setup Cachix
        if: github.event_name != 'pull_request'
        uses: cachix/cachix-action@v16
        with:
          name: dawidde-nixos
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # Debugging: verify substitutes are active
      - name: Show Nix config
        run: |
          nix show-config | grep substituters
          nix show-config | grep trusted-public-keys

      # Build with logs
      - name: Build SD image
        run: |
          nix-build \
            '<nixpkgs/nixos>' \
            -A config.system.build.sdImage \
            -I nixos-config=./pi/sd-image.nix \
            --show-trace \
            -vv

      # Collect image
      - name: Collect image
        run: |
          mkdir -p artifacts

          find -L result -type f \
            \( -iname "*.img" -o -iname "*.img.zst" -o -iname "*.img.gz" \) \
            -exec cp {} artifacts/ \;

          ls -lah artifacts

      # Upload image artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixos-sd-image
          path: artifacts/
          if-no-files-found: error
          retention-days: 7
